<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réservation VIP | Gracie Abrams</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .serif { font-family: 'Bodoni Moda', serif; }
        .bg-aesthetic { background-color: #fdfaf7; }
        .text-brown-dark { color: #3d2b1f; }
        .accent-brown { accent-color: #8c786a; }
        
        /* Animation subtile pour les champs */
        input:focus, select:focus {
            outline: none;
            border-color: #8c786a !important;
            box-shadow: 0 0 0 1px #8c786a;
        }
    </style>
</head>
<body class="bg-aesthetic text-brown-dark font-light">

    <header class="py-10 text-center">
        <div class="serif text-2xl font-bold tracking-tighter">
            concert<span class="text-stone-400">.</span>vip
        </div>
        <div class="mt-4">
            <a href="index.html" class="text-[10px] uppercase tracking-widest text-stone-400 hover:text-brown-dark transition">← Retour à l'accueil</a>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-6 pb-20">
        <div class="bg-white border border-stone-200 p-8 md:p-12 shadow-sm rounded-sm">
            
            <div class="text-center mb-12">
                <h1 class="serif text-3xl italic mb-2">Demande d'Accès VIP</h1>
                <p class="text-xs uppercase tracking-[0.2em] text-stone-400">The Secret of Us Tour — Paris 2026</p>
            </div>

            <form action="#" method="POST" class="space-y-8">
                
                <div class="space-y-4">
                    <h3 class="serif text-lg italic border-b border-stone-100 pb-2">Informations Personnelles</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="flex flex-col">
                            <label class="text-[10px] uppercase tracking-widest mb-2 font-semibold">Prénom</label>
                            <input type="text" placeholder="Gracie" class="bg-stone-50 border border-stone-200 p-3 text-sm rounded-none transition-all">
                        </div>
                        <div class="flex flex-col">
                            <label class="text-[10px] uppercase tracking-widest mb-2 font-semibold">Nom de famille</label>
                            <input type="text" placeholder="Abrams" class="bg-stone-50 border border-stone-200 p-3 text-sm rounded-none transition-all">
                        </div>
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[10px] uppercase tracking-widest mb-2 font-semibold">Adresse Email</label>
                        <input type="email" placeholder="fan@example.com" class="bg-stone-50 border border-stone-200 p-3 text-sm rounded-none transition-all">
                    </div>
                </div>

                <div class="space-y-4">
                    <h3 class="serif text-lg italic border-b border-stone-100 pb-2">Votre Expérience</h3>
                    <div class="flex flex-col">
                        <label class="text-[10px] uppercase tracking-widest mb-2 font-semibold">Type de Pass</label>
                        <select class="bg-stone-50 border border-stone-200 p-3 text-sm rounded-none appearance-none cursor-pointer transition-all">
                            <option>Close to You (Meet & Greet + Front Row)</option>
                            <option>I Know It Won't Work (Early Entry + Merch)</option>
                            <option>The Secret of Us (Standard VIP)</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-4">
                    <h3 class="serif text-lg italic border-b border-stone-100 pb-2">Préférences</h3>
                    
                    <div class="space-y-3">
                        <label class="text-[10px] uppercase tracking-widest mb-2 font-semibold block">Taille de Merch (Inclus dans le pack)</label>
                        <div class="flex gap-4">
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="radio" name="size" class="accent-brown"> <span class="text-xs">S</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="radio" name="size" class="accent-brown"> <span class="text-xs">M</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="radio" name="size" class="accent-brown"> <span class="text-xs">L</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="radio" name="size" class="accent-brown"> <span class="text-xs">XL</span>
                            </label>
                        </div>
                    </div>

                    <div class="flex flex-col">
                        <label class="text-[10px] uppercase tracking-widest mb-2 font-semibold">Une chanson que vous rêvez d'entendre en acoustique ?</label>
                        <textarea rows="2" placeholder="Ex: 'Risk' ou 'I miss you, I'm sorry'..." class="bg-stone-50 border border-stone-200 p-3 text-sm rounded-none transition-all"></textarea>
                    </div>
                </div>

                <div class="flex items-start gap-3">
                    <input type="checkbox" class="mt-1 accent-brown" id="terms">
                    <label for="terms" class="text-[10px] text-stone-500 leading-tight">J'accepte les conditions de vente et je comprends que l'accès VIP est soumis à une vérification d'identité à l'entrée de la salle.</label>
                </div>

                <div class="pt-6">
                    <button type="submit" class="w-full bg-[#8c786a] text-white py-4 rounded-full text-[10px] font-bold tracking-[0.3em] uppercase hover:bg-[#7a685c] transition-all shadow-lg hover:shadow-xl transform hover:-translate-y-0.5">
                        Confirmer ma réservation
                    </button>
                </div>

            </form>
        </div>

        <p class="text-center text-[9px] text-stone-400 mt-8 uppercase tracking-widest">
            Un email de confirmation vous sera envoyé sous 24h.
        </p>
    </main>

    <footer class="py-10 border-t border-stone-200">
        <div class="text-center serif text-sm italic opacity-50">concert.vip</div>
    </footer>

</body>
</html>
