<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP | Gracie Abrams</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fdfaf7; }
        .serif { font-family: 'Bodoni Moda', serif; }
        .bg-brown-main { background-color: #8c786a; }
        .hero-gradient { background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.4) 100%); }
    </style>
</head>
<body class="text-stone-800 antialiased">

    <section class="relative h-[45vh] flex items-center justify-center overflow-hidden">
        <img src="https://www.billboard.com/wp-content/uploads/2024/06/Gracie-Abrams-cr-Abby-Waisler-press-2024-billboard-1548.jpg?w=942&h=623&crop=1" 
             alt="Gracie Abrams" 
             class="absolute inset-0 w-full h-full object-cover">
        <div class="absolute inset-0 hero-gradient"></div>
        <h1 class="relative z-10 serif text-5xl md:text-7xl text-white italic drop-shadow-xl">Gracie Abrams</h1>
    </section>

    <main class="max-w-4xl mx-auto px-6 -mt-16 relative z-20">
        <div class="bg-white border border-stone-100 p-8 md:p-12 rounded-sm shadow-2xl">
            
            <h2 class="serif text-3xl md:text-4xl text-center mb-4">Le moment est enfin venu.</h2>

            <p class="text-center text-stone-400 mb-8 italic text-base">
                Rencontrez <strong>Gracie Abrams</strong> en personne. Accès ultra-limité.
            </p>

            <div class="flex justify-center mb-12">
                <a href="#" class="bg-brown-main hover:bg-[#7a685c] text-white px-10 py-4 rounded-full text-[10px] font-bold tracking-[0.2em] transition-all transform hover:scale-105 uppercase">
                    Réserver mon accès VIP
                </a>
            </div>

            <div class="grid md:grid-cols-3 gap-6 border-t border-stone-50 pt-10">
                <div class="text-center">
                    <h4 class="font-semibold uppercase tracking-widest text-[9px] mb-2 text-stone-500">Meet & Greet</h4>
                    <p class="text-[12px] text-stone-400">Rencontre & Photo</p>
                </div>
                <div class="text-center border-x border-stone-100">
                    <h4 class="font-semibold uppercase tracking-widest text-[9px] mb-2 text-stone-500">Front Row</h4>
                    <p class="text-[12px] text-stone-400">Premier rang garanti</p>
                </div>
                <div class="text-center">
                    <h4 class="font-semibold uppercase tracking-widest text-[9px] mb-2 text-stone-500">Collector</h4>
                    <p class="text-[12px] text-stone-400">Merch dédicacé</p>
                </div>
            </div>

        </div>

        <div class="py-8 text-center">
            <p class="text-[9px] text-stone-400 uppercase tracking-[0.4em] font-bold flex items-center justify-center gap-2">
                <span class="w-1 h-1 bg-amber-800 rounded-full animate-ping"></span>
                Seulement 2 pass restants
            </p>
        </div>
    </main>

</body>
</html>
